<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antilhas · Painel de Produção</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
</head>
<body>
  <div class="grid-backdrop"></div>

  <header class="topbar">
    <img src="/logo.png" alt="Antilhas" class="topbar-logo">
    <div class="topbar-right">
      <span id="userLabel" class="user-label"></span>
      <a id="adminLink" href="/admin" class="link-btn" style="display:none;">Subir planilha</a>
      <a href="/logout" class="link-btn">Sair</a>
    </div>
  </header>

  <main class="dashboard-wrap">
    <div id="emptyState" style="display:none;" class="empty-state">
      <p>Ainda não há dados carregados. Peça ao administrador para subir a planilha do dia.</p>
    </div>

    <div id="content" style="display:none;">
      <p class="updated-note" id="updatedNote"></p>

      <section class="cards-row">
        <div class="stat-card">
          <span class="stat-label">OEE Total</span>
          <span class="stat-value" id="oeeTotal">--</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Desempenho</span>
          <span class="stat-value" id="desempenhoTotal">--</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Disponibilidade</span>
          <span class="stat-value" id="disponibilidadeTotal">--</span>
        </div>
      </section>

      <section class="chart-section">
        <h2>OEE por grupo de máquina</h2>
        <canvas id="chartSubgrupo" height="110"></canvas>
      </section>

      <section class="chart-section">
        <h2>Evolução diária do OEE</h2>
        <canvas id="chartDiario" height="90"></canvas>
      </section>

      <div class="two-col">
        <section class="chart-section">
          <h2>Etiquetas por status</h2>
          <canvas id="chartStatus" height="140"></canvas>
        </section>
        <section class="chart-section">
          <h2>Etiquetas por prioridade</h2>
          <canvas id="chartPrioridade" height="140"></canvas>
        </section>
      </div>
    </div>
  </main>

  <script>
    const GREEN = '#2FAE66';
    const GREEN_DARK = '#1F7A49';
    const GRAY = '#8c9490';
    const PALETTE = ['#2FAE66', '#1F7A49', '#7FCB9E', '#5C645F', '#C7CFC9', '#0F5C33'];

    function pct(v) { return (v * 100).toFixed(1) + '%'; }

    async function init() {
      const me = await fetch('/api/me').then(r => r.json());
      document.getElementById('userLabel').textContent = `Olá, ${me.user.username}`;
      if (me.user.role === 'admin') {
        document.getElementById('adminLink').style.display = 'inline-block';
      }

      const data = await fetch('/api/dashboard-data').then(r => r.json());
      if (data.empty) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }
      document.getElementById('content').style.display = 'block';

      const dt = new Date(data.atualizadoEm);
      document.getElementById('updatedNote').textContent =
        `Atualizado em ${dt.toLocaleDateString('pt-BR')} às ${dt.toLocaleTimeString('pt-BR')} por ${data.atualizadoPor}`;

      document.getElementById('oeeTotal').textContent = pct(data.totais.oee);
      document.getElementById('desempenhoTotal').textContent = pct(data.totais.desempenho);
      document.getElementById('disponibilidadeTotal').textContent = pct(data.totais.disponibilidade);

      // Gráfico por subgrupo
      new Chart(document.getElementById('chartSubgrupo'), {
        type: 'bar',
        data: {
          labels: data.subgrupos.map(s => s.nome),
          datasets: [
            { label: 'OEE', data: data.subgrupos.map(s => s.oee * 100), backgroundColor: GREEN_DARK },
            { label: 'Desempenho', data: data.subgrupos.map(s => s.desempenho * 100), backgroundColor: GREEN },
            { label: 'Disponibilidade', data: data.subgrupos.map(s => s.disponibilidade * 100), backgroundColor: '#7FCB9E' }
          ]
        },
        options: {
          responsive: true,
          scales: { y: { ticks: { callback: v => v + '%' }, beginAtZero: true, max: 100 } }
        }
      });

      // Gráfico evolução diária
      new Chart(document.getElementById('chartDiario'), {
        type: 'line',
        data: {
          labels: data.evolucaoDiaria.map(d => 'Dia ' + d.dia),
          datasets: [{
            label: 'OEE (%)',
            data: data.evolucaoDiaria.map(d => d.oee * 100),
            borderColor: GREEN_DARK,
            backgroundColor: 'rgba(47,174,102,0.15)',
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          scales: { y: { ticks: { callback: v => v + '%' }, beginAtZero: true, max: 100 } }
        }
      });

      // Etiquetas por status
      const statusLabels = Object.keys(data.etiquetas.porStatus);
      new Chart(document.getElementById('chartStatus'), {
        type: 'doughnut',
        data: {
          labels: statusLabels,
          datasets: [{ data: statusLabels.map(l => data.etiquetas.porStatus[l]), backgroundColor: PALETTE }]
        },
        options: { responsive: true }
      });

      // Etiquetas por prioridade
      const prioLabels = Object.keys(data.etiquetas.porPrioridade);
      new Chart(document.getElementById('chartPrioridade'), {
        type: 'doughnut',
        data: {
          labels: prioLabels,
          datasets: [{ data: prioLabels.map(l => data.etiquetas.porPrioridade[l]), backgroundColor: PALETTE }]
        },
        options: { responsive: true }
      });
    }

    init();
  </script>
</body>
</html>

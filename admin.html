<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antilhas · Subir planilha</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="center-page">
  <div class="grid-backdrop"></div>
  <main class="card">
    <img src="/logo.png" alt="Antilhas" class="logo">
    <p class="eyebrow">Área do administrador</p>
    <h1>Atualizar dados</h1>
    <p class="desc">Envie a planilha de produção (.xlsx) mais recente para atualizar o painel.</p>

    <form id="uploadForm">
      <input class="field" type="file" name="planilha" id="planilha" accept=".xlsx" required>
      <button class="cta" type="submit" style="margin-top: 18px;">Enviar planilha</button>
    </form>

    <div id="status" style="margin-top:16px; font-size:14px;"></div>

    <p class="footer"><a href="/dashboard" style="color:var(--green-700);">← Voltar ao painel</a></p>
  </main>

  <script>
    const form = document.getElementById('uploadForm');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fileInput = document.getElementById('planilha');
      if (!fileInput.files.length) return;

      statusEl.textContent = 'Enviando e processando... isso pode levar alguns segundos.';
      statusEl.style.color = 'var(--ink-soft)';

      const formData = new FormData();
      formData.append('planilha', fileInput.files[0]);

      try {
        const resp = await fetch('/admin/upload', { method: 'POST', body: formData });
        const data = await resp.json();
        if (data.ok) {
          statusEl.textContent = 'Planilha processada com sucesso! Redirecionando...';
          statusEl.style.color = 'var(--green-700)';
          setTimeout(() => window.location.href = '/dashboard', 1200);
        } else {
          statusEl.textContent = 'Erro: ' + data.erro;
          statusEl.style.color = '#c0392b';
        }
      } catch (err) {
        statusEl.textContent = 'Erro de conexão ao enviar o arquivo.';
        statusEl.style.color = '#c0392b';
      }
    });
  </script>
</body>
</html>
